name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        clickhouse: ['24.8']

    services:
      clickhouse01:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}
        ports: ['18123:8123']
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: '1'
      clickhouse02:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}
        ports: ['18124:8123']
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Wait for ClickHouse
        run: |
          for host in 18123 18124; do
            for i in {1..30}; do
              if curl -sf "http://127.0.0.1:${host}/?query=SELECT%201" > /dev/null; then
                echo "clickhouse on :${host} ready"; break
              fi
              sleep 2
            done
          done

      - name: Run PHPUnit
        run: |
          # Gate cluster tests off: CI service containers cannot mount
          # tests/docker/clickhouse0*/config.xml, so company_cluster and
          # the {replica}/{shard} macros do not exist here.
          sed -i 's|CLICKHOUSE_CLUSTER_AVAILABLE" value="1"|CLICKHOUSE_CLUSTER_AVAILABLE" value="0"|' phpunit.xml
          vendor/bin/phpunit --testdox
